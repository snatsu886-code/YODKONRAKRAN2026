<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>บันทึกสั่งอะไหล่ — ยอดกลการ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1A1F2E; color: #F0F0F0; font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; min-height: 100vh; }
@media print {
  .no-print { display: none !important; }
  body { background: white !important; color: black !important; }
  .item-row { border-color: #ccc !important; background: #f9f9f9 !important; }
  .summary-date { color: #b45309 !important; }
  .day-total { background: #fff8e1 !important; color: #333 !important; border-color: #f59e0b !important; }
  .grand-total { background: #fff3e0 !important; color: #111 !important; }
}
.btn { cursor: pointer; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px 18px; transition: opacity .15s; }
.btn:hover { opacity: .82; }
.btn-amber { background: #F59E0B; color: #111; }
.btn-ghost { background: transparent; border: 1px solid #374151; color: #9CA3AF; }
.btn-red { background: #EF4444; color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.input { background: #1A1F2E; border: 1px solid #374151; border-radius: 8px; color: #F0F0F0; font-family: inherit; font-size: 14px; padding: 10px 12px; width: 100%; outline: none; }
.input:focus { border-color: #F59E0B; }
.tab { cursor: pointer; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all .15s; }
.tab.active { background: #F59E0B; color: #111; }
.tab:not(.active) { color: #9CA3AF; }
.item-row { background: #1E2433; border-radius: 10px; border: 1px dashed #374151; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.badge { display: inline-block; background: rgba(245,158,11,0.13); color: #F59E0B; border-radius: 6px; font-size: 11px; padding: 2px 8px; font-weight: 600; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1E2433; border: 1px solid #374151; border-radius: 10px; padding: 12px 22px; font-size: 14px; font-weight: 600; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4); white-space: nowrap; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #252B3B; border-radius: 16px; width: 100%; max-width: 460px; padding: 22px; border: 1px solid #374151; max-height: 90vh; overflow-y: auto; }
.modal label { font-size: 13px; color: #9CA3AF; display: block; margin-bottom: 5px; margin-top: 12px; }
.img-thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid #374151; flex-shrink: 0; cursor: pointer; }
.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.section-header h2 { font-size: 15px; font-weight: 700; white-space: nowrap; }
.dot-line { flex: 1; border-top: 1px dashed #374151; }
.summary-date { font-size: 12px; color: #F59E0B; font-weight: 700; margin: 14px 0 6px; }
.day-total { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; margin: 6px 0 14px; }
.grand-total { background: rgba(245,158,11,0.18); border: 2px solid #F59E0B; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.hidden { display: none !important; }
#img-preview { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; border: 1px solid #374151; }
.price-tag { color: #34D399; font-weight: 700; font-size: 13px; }
</style>
</head>
<body>

<!-- Header -->
<div class="no-print" style="background:#252B3B;border-bottom:1px solid #374151;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;">
  <div>
    <div style="font-size:11px;color:#F59E0B;font-weight:700;letter-spacing:2px;">ร้านยอดกลการ</div>
    <div style="font-size:18px;font-weight:700;">📦 บันทึกสั่งอะไหล่</div>
  </div>
  <div id="header-date" style="font-size:12px;color:#6B7280;text-align:right;"></div>
</div>

<!-- Tabs -->
<div class="no-print" style="display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid #374151;">
  <div class="tab active" id="tab-today" onclick="switchTab('today')">📋 วันนี้</div>
  <div class="tab" id="tab-history" onclick="switchTab('history')">📅 ย้อนหลัง</div>
  <div class="tab" id="tab-summary" onclick="switchTab('summary')">📊 สรุป</div>
</div>

<!-- Today View -->
<div id="view-today" style="padding:16px;">
  <div class="section-header">
    <h2 id="today-title">🗓</h2>
    <div class="dot-line"></div>
    <span class="badge" id="today-count">0 รายการ</span>
  </div>
  <div id="today-empty" style="text-align:center;color:#6B7280;padding:40px 0;">
    <div style="font-size:36px;margin-bottom:8px;">🔧</div>
    <div>ยังไม่มีรายการสั่งอะไหล่</div>
  </div>
  <div id="today-list"></div>
  <div id="today-daytotal" class="hidden day-total">
    <span style="font-size:13px;color:#9CA3AF;">💰 รวมวันนี้</span>
    <span id="today-daytotal-val" style="font-size:16px;font-weight:700;color:#F59E0B;"></span>
  </div>
  <button class="btn btn-amber no-print" style="width:100%;font-size:15px;margin-top:8px;" onclick="openForm()">+ เพิ่มอะไหล่</button>
</div>

<!-- History View -->
<div id="view-history" class="hidden" style="padding:16px;">
  <div style="margin-bottom:14px;">
    <label style="font-size:13px;color:#9CA3AF;display:block;margin-bottom:5px;">เลือกวัน</label>
    <select class="input" id="history-select" onchange="loadHistory()"></select>
  </div>
  <div class="section-header">
    <h2 id="history-title">🗓</h2>
    <div class="dot-line"></div>
    <span class="badge" id="history-count">0 รายการ</span>
  </div>
  <div id="history-empty" style="text-align:center;color:#6B7280;padding:40px 0;">
    <div style="font-size:36px;margin-bottom:8px;">🔧</div>
    <div>ไม่มีรายการวันนี้</div>
  </div>
  <div id="history-list"></div>
  <div id="history-daytotal" class="hidden day-total">
    <span style="font-size:13px;color:#9CA3AF;">💰 รวมวันนี้</span>
    <span id="history-daytotal-val" style="font-size:16px;font-weight:700;color:#F59E0B;"></span>
  </div>
</div>

<!-- Summary View -->
<div id="view-summary" class="hidden" style="padding:16px;">
  <div class="no-print" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <div style="flex:1;">
      <label style="font-size:13px;color:#9CA3AF;display:block;margin-bottom:5px;">จากวันที่</label>
      <input type="date" class="input" id="sum-from" onchange="renderSummary()" />
    </div>
    <div style="flex:1;">
      <label style="font-size:13px;color:#9CA3AF;display:block;margin-bottom:5px;">ถึงวันที่</label>
      <input type="date" class="input" id="sum-to" onchange="renderSummary()" />
    </div>
  </div>

  <!-- Grand Total Box -->
  <div id="grand-total-box" class="grand-total hidden">
    <div>
      <div style="font-size:11px;color:#9CA3AF;font-weight:600;">💳 ยอดรวมทั้งหมด</div>
      <div style="font-size:12px;color:#9CA3AF;" id="sum-count">0 รายการ</div>
    </div>
    <div id="grand-total-val" style="font-size:22px;font-weight:700;color:#F59E0B;"></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div id="sum-count-fallback" style="font-size:13px;color:#9CA3AF;">ทั้งหมด 0 รายการ</div>
    <button class="btn btn-ghost btn-sm no-print" onclick="window.print()">🖨️ พิมพ์</button>
  </div>

  <div id="summary-empty" style="text-align:center;color:#6B7280;padding:40px 0;">
    <div style="font-size:32px;margin-bottom:8px;">📭</div>
    <div>ไม่มีข้อมูลในช่วงที่เลือก</div>
  </div>
  <div id="summary-list"></div>
</div>

<!-- Modal -->
<div class="modal-bg hidden" id="modal-bg" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div id="modal-title" style="font-weight:700;font-size:16px;margin-bottom:4px;">➕ เพิ่มอะไหล่</div>
    <div id="modal-date" style="font-size:12px;color:#6B7280;margin-bottom:14px;"></div>
    <label>ชื่ออะไหล่ *</label>
    <input class="input" id="f-name" placeholder="เช่น ผ้าเบรก, น้ำมันเครื่อง..." />
    <div style="display:flex;gap:8px;">
      <div style="flex:1;"><label>จำนวน</label><input class="input" id="f-qty" type="number" placeholder="0" /></div>
      <div style="flex:1;"><label>หน่วย</label><input class="input" id="f-unit" placeholder="ชิ้น / กล่อง / ลิตร" /></div>
    </div>
    <label>ราคา/ชิ้น (บาท)</label>
    <input class="input" id="f-price" type="number" placeholder="0.00" />
    <label>ทะเบียน / รุ่นรถ</label>
    <input class="input" id="f-car" placeholder="เช่น กข-1234 / Toyota Vios" />
    <label>หมายเหตุ</label>
    <input class="input" id="f-note" placeholder="รายละเอียดเพิ่มเติม..." />
    <label>รูปภาพอะไหล่ / รถ</label>
    <input type="file" id="f-img-input" accept="image/*" style="display:none;" onchange="handleImage(event)" />
    <div style="display:flex;gap:8px;align-items:center;margin-top:5px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('f-img-input').click()">📷 เลือกรูป / ถ่ายภาพ</button>
      <img id="img-preview" class="hidden" alt="preview" />
      <button class="btn btn-ghost btn-sm hidden" id="img-clear-btn" onclick="clearImage()">✕</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeForm()">ยกเลิก</button>
      <button class="btn btn-amber" style="flex:2;" id="save-btn" onclick="saveItem()">✓ เพิ่มรายการ</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<script>
const STORAGE_KEY = 'yodkon-parts-orders';
let orders = {};
let currentView = 'today';
let editId = null;
let currentImageData = null;
let selectedHistoryDate = null;

function getTodayKey() {
  return new Date().toISOString().slice(0, 10);
}
function formatDateThai(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function loadOrders() {
  try { orders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { orders = {}; }
}
function saveOrders() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
   } catch(e) {
    showToast('⚠️ พื้นที่เต็ม! ลองลบรูปบางรายการ', 'err');
  }
}
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = type === 'err' ? '#EF4444' : '#10B981';
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2200);
}
function formatBaht(num) {
  if (!num || isNaN(num)) return '';
  return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' ฿';
}
function calcItemTotal(item) {
  const price = parseFloat(item.price) || 0;
  const qty = parseFloat(item.qty) || 1;
  return price > 0 ? price * qty : 0;
}
function calcDayTotal(items) {
  return items.reduce((s, i) => s + calcItemTotal(i), 0);
}

function switchTab(tab) {
  currentView = tab;
  ['today','history','summary'].forEach(v => {
    document.getElementById('view-' + v).classList.toggle('hidden', v !== tab);
    document.getElementById('tab-' + v).classList.toggle('active', v === tab);
  });
  if (tab === 'today') renderToday();
  if (tab === 'history') renderHistory();
  if (tab === 'summary') renderSummary();
}

function renderToday() {
  const key = getTodayKey();
  const items = orders[key] || [];
  document.getElementById('today-title').textContent = '🗓 ' + formatDateThai(key);
  document.getElementById('today-count').textContent = items.length + ' รายการ';
  document.getElementById('today-empty').classList.toggle('hidden', items.length > 0);
  document.getElementById('today-list').innerHTML = items.map((item, idx) => itemHTML(item, idx, true, key)).join('');
  const dayTotal = calcDayTotal(items);
  const dtEl = document.getElementById('today-daytotal');
  if (dayTotal > 0 && items.length > 0) {
    dtEl.classList.remove('hidden');
    document.getElementById('today-daytotal-val').textContent = formatBaht(dayTotal);
  } else { dtEl.classList.add('hidden'); }
}

function renderHistory() {
  const dates = Object.keys(orders).filter(k => (orders[k] || []).length > 0).sort().reverse();
  const sel = document.getElementById('history-select');
  if (dates.length === 0) {
    sel.innerHTML = '<option value="">ยังไม่มีข้อมูล</option>';
    selectedHistoryDate = null;
  } else {
    sel.innerHTML = dates.map(d => `<option value="${d}">${formatDateThai(d)}</option>`).join('');
    if (!selectedHistoryDate || !dates.includes(selectedHistoryDate)) selectedHistoryDate = dates[0];
    sel.value = selectedHistoryDate;
  }
  loadHistory();
}

function loadHistory() {
  const sel = document.getElementById('history-select');
  selectedHistoryDate = sel.value;
  const items = selectedHistoryDate ? (orders[selectedHistoryDate] || []) : [];
  document.getElementById('history-title').textContent = '🗓 ' + (selectedHistoryDate ? formatDateThai(selectedHistoryDate) : '');
  document.getElementById('history-count').textContent = items.length + ' รายการ';
  document.getElementById('history-empty').classList.toggle('hidden', items.length > 0);
  document.getElementById('history-list').innerHTML = items.map((item, idx) => itemHTML(item, idx, false, selectedHistoryDate)).join('');
  const dayTotal = calcDayTotal(items);
  const dtEl = document.getElementById('history-daytotal');
  if (dayTotal > 0 && items.length > 0) {
    dtEl.classList.remove('hidden');
    document.getElementById('history-daytotal-val').textContent = formatBaht(dayTotal);
  } else { dtEl.classList.add('hidden'); }
}

function renderSummary() {
  const today = getTodayKey();
  const fromEl = document.getElementById('sum-from');
  const toEl = document.getElementById('sum-to');
  if (!fromEl.value) fromEl.value = today;
  if (!toEl.value) toEl.value = today;
  const from = fromEl.value, to = toEl.value;

  const grouped = {};
  Object.keys(orders).filter(k => k >= from && k <= to && (orders[k] || []).length > 0).sort().forEach(k => { grouped[k] = orders[k]; });
  const allItems = Object.values(grouped).flat();
  const grandTotal = allItems.reduce((s, i) => s + calcItemTotal(i), 0);

  document.getElementById('sum-count').textContent = allItems.length + ' รายการ';
  document.getElementById('sum-count-fallback').textContent = 'ทั้งหมด ' + allItems.length + ' รายการ';
  document.getElementById('summary-empty').classList.toggle('hidden', allItems.length > 0);

  const gtBox = document.getElementById('grand-total-box');
  if (grandTotal > 0 && allItems.length > 0) {
    gtBox.classList.remove('hidden');
    document.getElementById('grand-total-val').textContent = formatBaht(grandTotal);
  } else { gtBox.classList.add('hidden'); }

  const html = Object.keys(grouped).map(date => {
    const dayItems = grouped[date];
    const dayTotal = calcDayTotal(dayItems);
    return `<div class="summary-date">📅 ${formatDateThai(date)}</div>` +
    dayItems.map(item => {
      const total = calcItemTotal(item);
      return `<div class="item-row">
        ${item.image ? `<img src="${item.image}" class="img-thumb" alt="part" onclick="window.open('${item.image}')" />` : ''}
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;">${esc(item.name)}</div>
          <div style="font-size:12px;color:#9CA3AF;display:flex;gap:8px;flex-wrap:wrap;">
            ${item.qty ? `<span>จำนวน: <b style="color:#F59E0B">${esc(item.qty)} ${esc(item.unit)}</b></span>` : ''}
            ${item.price ? `<span class="price-tag">${esc(item.price)} ฿/ชิ้น${total > 0 && item.qty > 1 ? ` = ${formatBaht(total)}` : ''}</span>` : ''}
            ${item.car ? `<span>🚗 ${esc(item.car)}</span>` : ''}
          </div>
          ${item.note ? `<div style="font-size:11px;color:#6B7280;margin-top:3px;">📝 ${esc(item.note)}</div>` : ''}
        </div>
      </div>`;
    }).join('') +
    (dayTotal > 0 ? `<div class="day-total"><span style="font-size:13px;color:#9CA3AF;">💰 รวมวัน${formatDateThai(date).split(' ')[0]}</span><span style="font-size:15px;font-weight:700;color:#F59E0B;">${formatBaht(dayTotal)}</span></div>` : '');
  }).join('');
  document.getElementById('summary-list').innerHTML = html;
}

function itemHTML(item, idx, editable, dateKey) {
  const total = calcItemTotal(item);
  return `<div class="item-row">
    ${item.image ? `<img src="${item.image}" class="img-thumb" alt="part" onclick="window.open('${item.image}')" />` : ''}
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
        <span style="font-size:12px;color:#6B7280;font-family:monospace;">#${idx+1}</span>
        <span style="font-weight:700;font-size:15px;">${esc(item.name)}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:#9CA3AF;">
        ${item.qty ? `<span>จำนวน: <b style="color:#F59E0B">${esc(item.qty)} ${esc(item.unit)}</b></span>` : ''}
        ${item.price ? `<span class="price-tag">${esc(item.price)} ฿${total > 0 && parseFloat(item.qty) > 1 ? ` × ${item.qty} = ${formatBaht(total)}` : ''}</span>` : ''}
        ${item.car ? `<span>🚗 ${esc(item.car)}</span>` : ''}
        ${item.time ? `<span>🕐 ${esc(item.time)}</span>` : ''}
      </div>
      ${item.note ? `<div style="margin-top:4px;font-size:12px;color:#9CA3AF;background:rgba(0,0,0,.2);border-radius:6px;padding:3px 8px;">📝 ${esc(item.note)}</div>` : ''}
    </div>
    ${editable ? `<div style="display:flex;gap:6px;flex-shrink:0;">
      <button class="btn btn-ghost btn-sm no-print" onclick="editItem('${item.id}','${dateKey}')">✏️</button>
      <button class="btn btn-red btn-sm no-print" onclick="deleteItem('${item.id}','${dateKey}')">🗑</button>
    </div>` : ''}
  </div>`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openForm() {
  editId = null; currentImageData = null;
  ['f-name','f-qty','f-unit','f-car','f-note','f-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-img-input').value = '';
  document.getElementById('img-preview').classList.add('hidden');
  document.getElementById('img-clear-btn').classList.add('hidden');
  document.getElementById('modal-title').textContent = '➕ เพิ่มอะไหล่';
  document.getElementById('save-btn').textContent = '✓ เพิ่มรายการ';
  document.getElementById('modal-date').textContent = formatDateThai(getTodayKey());
  document.getElementById('modal-bg').classList.remove('hidden');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function editItem(id, dateKey) {
  const item = (orders[dateKey] || []).find(i => i.id === id);
  if (!item) return;
  editId = id; currentImageData = item.image || null;
  document.getElementById('f-name').value = item.name || '';
  document.getElementById('f-qty').value = item.qty || '';
  document.getElementById('f-unit').value = item.unit || '';
  document.getElementById('f-car').value = item.car || '';
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('f-price').value = item.price || '';
  document.getElementById('modal-title').textContent = '✏️ แก้ไขรายการ';
  document.getElementById('save-btn').textContent = 'บันทึกการแก้ไข';
  document.getElementById('modal-date').textContent = formatDateThai(dateKey);
  if (item.image) {
    const prev = document.getElementById('img-preview');
    prev.src = item.image; prev.classList.remove('hidden');
    document.getElementById('img-clear-btn').classList.remove('hidden');
  } else {
    document.getElementById('img-preview').classList.add('hidden');
    document.getElementById('img-clear-btn').classList.add('hidden');
  }
  document.getElementById('modal-bg').classList.remove('hidden');
}

function closeForm() { document.getElementById('modal-bg').classList.add('hidden'); }

function handleImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentImageData = canvas.toDataURL('image/jpeg', 0.6);
      const prev = document.getElementById('img-preview');
      prev.src = currentImageData; prev.classList.remove('hidden');
      document.getElementById('img-clear-btn').classList.remove('hidden');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}


function clearImage() {
  currentImageData = null;
  document.getElementById('img-preview').classList.add('hidden');
  document.getElementById('img-clear-btn').classList.add('hidden');
  document.getElementById('f-img-input').value = '';
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('ใส่ชื่ออะไหล่ก่อน', 'err'); return; }
  const key = getTodayKey();
  const item = {
    id: editId || generateId(),
    name,
    qty: document.getElementById('f-qty').value,
    unit: document.getElementById('f-unit').value.trim() || 'ชิ้น',
    price: document.getElementById('f-price').value,
    car: document.getElementById('f-car').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    image: currentImageData,
    time: editId
      ? ((orders[key] || []).find(i => i.id === editId)?.time || new Date().toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'}))
      : new Date().toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'}),
  };
  if (!orders[key]) orders[key] = [];
  if (editId) {
    const idx = orders[key].findIndex(i => i.id === editId);
    if (idx >= 0) orders[key][idx] = item; else orders[key].push(item);
  } else { orders[key].push(item); }
  saveOrders(); closeForm(); renderToday();
  showToast(editId ? 'แก้ไขแล้ว ✓' : 'เพิ่มรายการแล้ว ✓');
}

function deleteItem(id, dateKey) {
  if (!confirm('ลบรายการนี้?')) return;
  orders[dateKey] = (orders[dateKey] || []).filter(i => i.id !== id);
  saveOrders();
  if (currentView === 'today') renderToday();
  if (currentView === 'history') loadHistory();
  showToast('ลบแล้ว');
}

// Init
loadOrders();
const today = getTodayKey();
document.getElementById('header-date').textContent = new Date().toLocaleDateString('th-TH', {month:'short', day:'numeric'});
document.getElementById('sum-from').value = today;
document.getElementById('sum-to').value = today;
renderToday();
</script>
